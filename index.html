    <style>
      /* Hide loader once React loads */
      #loader-1 {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
      }
      
      #root:not(:empty) ~ #loader-1 {
        display: none;
      }
      
      /* React-specific layout fixes */
      #root { height: 100vh; overflow: hidden; }
      
      /* Ensure navigation panels are scrollable */
      #home-navigation-panel,
      #home-navigation-panel-settings {
        overflow-y: auto;
        max-height: 100vh;
      }
      
      /* Fix main card layout */
      body > #root > .mdo-card {
        display: flex;
        height: 100vh;
      }
      
      /* Navigation sidebar */
      .mdo-offcanvas-vertical {
        flex-shrink: 0;
      }
      
      /* Content area */
      #sidesheet-base {
        flex: 1;
        overflow: hidden;
        display: flex;
      }
      
      /* Inner flex container */
      #sidesheet-base > .mdo-card.mdo-vertical {
        display: flex;
        flex: 1;
        width: 100%;
      }
      
      /* Wrapper div */
      #sidesheet-base > .mdo-card.mdo-vertical > div {
        display: flex;
        flex: 1;
        width: 100%;
      }
      
      /* Tab content fills space */
      .mdo-tab-content {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      
      /* Inner card containing nav + content */
      .mdo-tab-content > .mdo-card {
        display: flex;
        flex: 1;
        height: 100%;
        overflow: hidden;
      }
      
      /* Navigation panel fixed width */
      #home-navigation-panel,
      #home-navigation-panel-settings {
        flex-shrink: 0;
      }
      
      /* Content scrolling and fills remaining space */
      .mdo-allow-overflow {
        overflow-y: auto;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <svg version="1.1" id="loader-1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" x="0px" y="0px"
      width="36px" height="36px" viewBox="0 0 36 36" enable-background="new 0 0 36 36" xml:space="preserve">

      c0-6.425,5.209-11.634,11.634-11.634c6.425,0,11.633,5.209,11.633,11.634C31.834,26.541,26.626,31.749,20.201,31.749z"/>
      <path fill="#455A64" d="M26.013,10.047l1.654-2.866c-2.198-1.272-4.743-2.012-7.466-2.012h0v3.312h0
      C22.32,8.481,24.301,9.057,26.013,10.047z">

      attributeName="transform"
      type="rotate"
      from="0 20 20"
      to="360 20 20"
